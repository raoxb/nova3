# coturn TURN server configuration for Nova2
# See: https://github.com/coturn/coturn

# Network
listening-port=3478
# tls-listening-port=5349

# Use fingerprint in TURN message
fingerprint

# Long-term credential mechanism
lt-cred-mech

# Static user credentials (must match config.yaml turn.servers)
user=nova2:nova2turn

# Realm
realm=nova2

# Logging
log-file=stdout
verbose

# Disable CLI
no-cli

# Recommended security settings
no-multicast-peers
no-tlsv1
no-tlsv1_1
