<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Click Monitor</title>
    <style>
        body {
          height: 100vh;
          margin: 0;
          background-color: #f0f0f0;
          user-select: none;
        }
    </style>
</head>
<body>
<script>
    document.addEventListener('click', function (event) {
      // 单独打印 x/y 相关
      console.log("Click position:");
      console.log("  clientX/clientY:", event.clientX, event.clientY);
      console.log("  pageX/pageY    :", event.pageX, event.pageY);
      console.log("  screenX/screenY:", event.screenX, event.screenY);
      console.log("  offsetX/offsetY:", event.offsetX, event.offsetY);

      // 打印其他常用属性
      console.log("Event full info:");
      console.log({
        type: event.type,
        timeStamp: event.timeStamp,
        isTrusted: event.isTrusted,
        target: event.target.tagName,
        detail: event.detail,
        button: event.button,
        buttons: event.buttons,
        altKey: event.altKey,
        ctrlKey: event.ctrlKey,
        shiftKey: event.shiftKey,
        metaKey: event.metaKey,
        defaultPrevented: event.defaultPrevented
      });

      // 可选：传给 Android
      if (window.AndroidInterface) {
        window.AndroidInterface.onClick(event.clientX, event.clientY);
      }
    });
</script>
</body>
</html>
